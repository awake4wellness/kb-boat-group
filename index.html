function extractMonth(t){
  const all={january:1,february:2,march:3,april:4,may:5,june:6,july:7,august:8,september:9,october:10,november:11,december:12,
    jan:1,feb:2,mar:3,apr:4,jun:6,jul:7,aug:8,sep:9,sept:9,oct:10,nov:11,dec:12,
    enero:1,febrero:2,marzo:3,abril:4,mayo:5,junio:6,julio:7,agosto:8,septiembre:9,setiembre:9,octubre:10,noviembre:11,diciembre:12,
    ene:1,abr:4,ago:8,dic:12};
  const low=t.toLowerCase();let m;
  m=low.match(/([a-záéíóú]{3,12})\.?\s+(\d{1,2})(?:st|nd|rd|th)?,?\s+(20\d{2})/);
  if(m&&all[m[1]])return m[3]+'-'+String(all[m[1]]).padStart(2,'0');
  m=low.match(/(\d{1,2})\s*(?:de\s+)?([a-záéíóú]{3,12})\.?\s*(?:de\s+)?(20\d{2})/);
  if(m&&all[m[2]])return m[3]+'-'+String(all[m[2]]).padStart(2,'0');
  m=t.match(/\b(20\d{2})[\/\-](\d{1,2})[\/\-](\d{1,2})\b/);
  if(m)return m[1]+'-'+String(+m[2]).padStart(2,'0');
  m=t.match(/\b(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})\b/);
  if(m){let mo=+m[1],yr=+m[3];if(yr<100)yr+=2000;if(mo>=1&&mo<=12)return yr+'-'+String(mo).padStart(2,'0');}
  return null;
}
function parseReceipt(text){
  const t=(text||'').replace(/ /g,' ');const low=t.toLowerCase();
  const out={amount:null,month:null,method:null,note:null};
  let amts=[],m;const re=/\$\s?(\d{1,3}(?:,\d{3})*(?:\.\d{1,2})?|\d+(?:\.\d{1,2})?)/g;
  while((m=re.exec(t)))amts.push(parseFloat(m[1].replace(/,/g,'')));
  if(!amts.length){const re2=/(\d{1,3}(?:,\d{3})+(?:\.\d{2})?|\d+\.\d{2})/g;while((m=re2.exec(t)))amts.push(parseFloat(m[1].replace(/,/g,'')));}
  amts=amts.filter(n=>n>0&&n<100000);
  if(amts.length)out.amount=Math.max(...amts);
  const meth=[['zelle','Zelle'],['venmo','Venmo'],['paypal','PayPal'],['cash app','Efectivo'],['cashapp','Efectivo'],['efectivo','Efectivo'],['transferencia','Transferencia'],['transfer','Transferencia'],['wire','Transferencia'],['ach','Transferencia']];
  for(const[k,v] of meth){if(low.includes(k)){out.method=v;break;}}
  out.month=extractMonth(t);
  const refm=t.match(/(?:confirmation|reference|transaction\s*id|conf(?:irmation)?\.?|ref\.?)\s*(?:number|no\.?|n[º°]|#)?\s*[:#\-]?\s*([A-Za-z0-9][A-Za-z0-9\-]{4,})/i);
  if(refm&&/\d/.test(refm[1]))out.note=refm[1];
  return out;
}

function render(){

  document.getElementById('login').style.display='none';document.getElementById('shell').style.display='flex';
  const u=me();

  document.getElementById('who').innerHTML=`<b>${esc(u.name.split(' ')[0])}</b> <span class="role">${u.role==='admin'?'Tesorero':'Socio'}</span><br><span data-action="logout" style="display:inline-block;margin-top:4px;font-size:11px;font-weight:600;text-decoration:underline;cursor:pointer;opacity:.92">Salir / cambiar socio ⏏</span>`;
  const v=document.getElementById('view');
  const t=S.tab;
  v.innerHTML = t==='fondo'?viewFondo() : t==='salidas'?viewSalidas() : t==='docs'?viewDocs() : t==='chat'?viewChat() : t==='mas'?viewMas() : viewRecuerdos();
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x.dataset.tab===t));
  window.scrollTo(0,0);

/* ---------------- weather (Open-Meteo) ---------------- */
const WMO={0:['☀️','Despejado'],1:['🌤️','Mayormente despejado'],2:['⛅','Parcialmente nublado'],3:['☁️','Nublado'],45:['🌫️','Niebla'],48:['🌫️','Niebla'],51:['🌦️','Llovizna'],53:['🌦️','Llovizna'],55:['🌧️','Llovizna fuerte'],61:['🌧️','Lluvia'],63:['🌧️','Lluvia'],65:['🌧️','Lluvia fuerte'],80:['🌦️','Chubascos'],81:['🌧️','Chubascos'],82:['⛈️','Chubascos fuertes'],95:['⛈️','Tormenta'],96:['⛈️','Tormenta'],99:['⛈️','Tormenta']};
async function loadWeather(){
  const boxes=[document.getElementById('wxBox'),document.getElementById('wxBoxFull')].filter(Boolean);
  if(!boxes.length)return;
  const {lat,lon,place}=S.weather;
  if(lat==null||lon==null){boxes.forEach(b=>b.innerHTML='<div class="muted" style="font-size:14px">Configura la ubicación del bote en Más → Ajustes.</div>');return;}
  let html='<div class="muted" style="font-size:14px">No se pudo cargar el clima. Toca actualizar.</div>';
  try{
    const f=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,precipitation,weather_code,wind_speed_10m&daily=precipitation_probability_max&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto`).then(r=>r.json());
    let waveFt='—';
    try{const mw=await fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&current=wave_height&timezone=auto`).then(r=>r.json());
      if(mw.current&&mw.current.wave_height!=null)waveFt=(mw.current.wave_height*3.281).toFixed(1)+' ft';}catch(e){}
    const c=f.current,code=WMO[c.weather_code]||['🌡️',''],prob=(f.daily&&f.daily.precipitation_probability_max&&f.daily.precipitation_probability_max[0])??'—';
    html=`<div class="row" style="margin-bottom:12px"><div><div class="wx-now">${code[0]} ${Math.round(c.temperature_2m)}°F</div>
        <div class="muted" style="font-size:13px">${code[1]}${place?' · '+esc(place):''}</div></div></div>
      <div class="wx"><div class="tile"><div class="v">${prob}%</div><div class="l">Lluvia hoy</div></div>
        <div class="tile"><div class="v">${waveFt}</div><div class="l">Oleaje</div></div>
        <div class="tile"><div class="v">${Math.round(c.wind_speed_10m)}</div><div class="l">Viento mph</div></div></div>`;
  }catch(e){}
  boxes.forEach(b=>b.innerHTML=html);
}
function refreshWx(){[document.getElementById('wxBox'),document.getElementById('wxBoxFull')].filter(Boolean).forEach(x=>x.innerHTML='<div class="muted" style="font-size:14px">Cargando…</div>');loadWeather();}

      }

    });
  }

  if(a==='splitFee'){return withBusy(async()=>{const fee=Math.round(S.monthlyTotal/S.members.length*100)/100;await patchConfig({fee});await reload();});}
  if(a==='addUnavail'){const d=val('unavailDate');if(!d){alert('Elige un día.');return;}const u=me();const cur=u.unavailableDates||[];if(cur.includes(d)){alert('Ese día ya está en tu lista.');return;}const arr=[...cur,d];return withBusy(async()=>{await db.from('boat_members').update({unavailable_dates:arr}).eq('id',u.id);await reload();});}
  if(a==='delUnavail'){const d=t.dataset.date;const u=me();const arr=(u.unavailableDates||[]).filter(x=>x!==d);return withBusy(async()=>{await db.from('boat_members').update({unavailable_dates:arr}).eq('id',u.id);await reload();});}
  if(a==='refreshChat'){return withBusy(async()=>{const {data}=await db.from('boat_chat').select('*').order('created_at');CHAT=(data||[]).map(mapChatRow);renderChatMsgs();});}
  if(a==='sendChat'){const txt=val('chatInput');if(!txt)return;const u=me();document.getElementById('chatInput').value='';
    return withBusy(async()=>{await db.from('boat_chat').insert({member_id:u.id,text:txt});
      const {data}=await db.from('boat_chat').select('*').order('created_at');CHAT=(data||[]).map(mapChatRow);renderChatMsgs();});}

  // payments
  if(a==='confirmPay'){return withBusy(async()=>{await db.from('boat_contributions').update({status:'confirmado',confirmed_by:me().id}).eq('id',t.dataset.id);await reload();});}
  if(a==='rejectPay'){const c=S.contributions.find(x=>x.id===t.dataset.id);
    return withBusy(async()=>{if(c){for(const u of (c.proofUrls||[]))await deleteImageByUrl(u);}await db.from('boat_contributions').delete().eq('id',t.dataset.id);await reload();});}
  if(a==='addExpense'){const concept=val('expC'),amt=+val('expA')||0;if(!concept||!amt){alert('Concepto y monto.');return;}
    return withBusy(async()=>{await db.from('boat_expenses').insert({concept,amount:amt,created_by:me().id});await reload();});}
  if(a==='delExpense'){return withBusy(async()=>{await db.from('boat_expenses').delete().eq('id',t.dataset.id);await reload();});}
  // documentos
  if(a==='docFile'){pickFile(f=>{pendingDocFile=f;const p=document.getElementById('docFilePrev');if(p)p.textContent='✓ '+f.name;});return;}
  if(a==='addDoc'){const title=val('docTitle');if(!title){alert('Ponle un título.');return;}const type=val('docType')||'Documento';const note=val('docNote');let url=val('docUrl');const pf=pendingDocFile;
    return withBusy(async()=>{let fileName=null;if(pf){url=await uploadDocFile(pf.dataUrl,pf.name);fileName=pf.name;}await db.from('boat_docs').insert({title,doc_type:type,note:note||null,url:url||null,file_name:fileName,created_by:me().id});pendingDocFile=null;await reload();});}
  if(a==='delDoc'){if(!confirm('¿Eliminar este documento?'))return;const id=t.dataset.id,url=t.dataset.url;
    return withBusy(async()=>{if(url&&url.indexOf('/'+BUCKET+'/')>=0)await deleteImageByUrl(url);await db.from('boat_docs').delete().eq('id',id);await reload();});}

  // outings
  if(a==='newOuting'){const date=val('noDate');if(!date){alert('Elige una fecha.');return;}

    return withBusy(async()=>{await db.from('boat_outings').insert({date,title:title||null,attendees:[],free_guests:[],paid_spots:[]});await reload();});}
  if(a==='delOuting'){if(!confirm('¿Eliminar salida y su álbum?'))return;const oid=t.dataset.oid;const ph=S.photos.filter(p=>p.outingId===oid);
    return withBusy(async()=>{for(const p of ph)await deleteImageByUrl(p.url);await db.from('boat_outings').delete().eq('id',oid);await reload();});}
  if(a==='toggleAtt'){const oid=t.dataset.oid,mid=t.dataset.mid;const o=S.outings.find(x=>x.id===oid);
    const on=(o.attendees||[]).includes(mid);
    if(!on&&outingUsed(o)>=S.capacity){alert('No quedan cupos en esta salida.');return;}
    return withBusy(async()=>{await updateOuting(oid,L=>{const i=L.attendees.indexOf(mid);i>=0?L.attendees.splice(i,1):L.attendees.push(mid);});await reload();});}
  if(a==='addFree'){const oid=t.dataset.oid;const o=S.outings.find(x=>x.id===oid);const name=val('fgName-'+oid),host=val('fgHost-'+oid);
    if(!name){alert('Nombre del invitado.');return;}

    if(freeUsed(host,monthOf(o.date))>=S.freeGuestsPerMonth){alert('Ese socio ya usó su invitado gratis del mes. Agrégalo como alquiler.');return;}
    return withBusy(async()=>{await updateOuting(oid,L=>{L.freeGuests.push({id:uid(),name,hostId:host});});await reload();});}
  if(a==='delFree'){const oid=t.dataset.oid,gid=t.dataset.gid;
    return withBusy(async()=>{await updateOuting(oid,L=>{L.freeGuests=L.freeGuests.filter(g=>g.id!==gid);});await reload();});}
  if(a==='addPaid'){const oid=t.dataset.oid;const o=S.outings.find(x=>x.id===oid);const name=val('psName-'+oid);let amt=+val('psAmt-'+oid)||S.minCharge;

  if(a==='delPhoto'){const id=t.dataset.id,url=t.dataset.url;
    return withBusy(async()=>{await deleteImageByUrl(url);await db.from('boat_photos').delete().eq('id',id);await reload();});}

  // members / admin

    const numMap={fee:'fee',monthlyTotal:'monthly_total',capacity:'capacity',freeGuestsPerMonth:'free_guests_per_month',minCharge:'min_charge'};
    if(numMap[k]){const v=Math.max(0,+raw||0);S[k]=v;return withBusy(async()=>{await patchConfig({[numMap[k]]:v});await reload();});}
    if(k==='currency'){S.currency=raw||'$';return withBusy(async()=>{await patchConfig({currency:S.currency});await reload();});}
    if(k==='wxplace'){S.weather.place=raw;return withBusy(async()=>{await patchConfig({weather:S.weather});});}
    if(k==='wxlat'){S.weather.lat=raw===''?null:+raw;return withBusy(async()=>{await patchConfig({weather:S.weather});});}
    if(k==='wxlon'){S.weather.lon=raw===''?null:+raw;return withBusy(async()=>{await patchConfig({weather:S.weather});});}
    if(k==='wxguru'){S.weather.windguru=raw.trim();return withBusy(async()=>{await patchConfig({weather:S.weather});});}
    return;}
  const pm=e.target.closest('[data-pm]');
  if(pm){const i=+pm.dataset.i;S.payMethods[i][pm.dataset.pm]=pm.value;withBusy(async()=>{await patchConfig({pay_methods:S.payMethods});});return;}

  wrap.querySelector('#pf_img').onclick=()=>pickImage(d=>{imgData=d;wrap.querySelector('#pf_prev').textContent='✓ Imagen adjunta';});
  wrap.querySelector('#pf_send').onclick=()=>{

    withBusy(async()=>{
      if(localImg)payload.proof_url=await uploadImage(localImg,'proofs');
      await db.from('boat_contributions').insert(payload);await reload();
      alert('Soporte enviado. El tesorero lo confirmará.');
    });
  };
}

/* ---------------- boot ---------------- */
async function boot(){
  try{const se=localStorage.getItem(SESSKEY);if(se)SESSION=JSON.parse(se);}catch(e){}
  try{await loadData();}
  catch(e){document.getElementById('loginErr').textContent='No hay conexión con la base de datos. Revisa tu internet y recarga.';}
  ready=true;render();
}
boot();
</script>
